<!DOCTYPE html>
<!-- ChatGPT-style zero-build UI shell for the FDAgent /ask endpoint. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FDAgent - Drug-Recall Intelligence</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Conversations">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">F</div>
        <div>
          <h1>FDAgent</h1>
          <p>Drug-recall intelligence</p>
        </div>
      </div>

      <button class="new-chat" type="button" id="newChat">New chat</button>
      <nav class="conversation-list" id="conversationList" aria-label="Saved conversations"></nav>
    </aside>

    <main class="chat-pane">
      <header class="chat-header">
        <div>
          <h2 id="conversationTitle">New chat</h2>
          <p>Ask about U.S. FDA drug-recall enforcement reports. Each turn calls /ask independently.</p>
        </div>
        <a class="lab-link" href="/hybrid-search">Hybrid search lab</a>
      </header>

      <section class="examples" id="examples" aria-label="Example questions"></section>
      <section class="notice" id="notice" aria-live="polite"></section>
      <section class="thread" id="thread" aria-label="Chat thread"></section>

      <form class="composer" id="composer">
        <textarea id="questionInput" rows="1" autocomplete="off"
          placeholder="Ask about recalls, firms, trends, or fuzzy concepts..."></textarea>
        <div class="composer-actions">
          <button class="secondary" type="button" id="stopButton">Stop generation</button>
          <button type="submit" id="sendButton">Send</button>
        </div>
      </form>
    </main>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
